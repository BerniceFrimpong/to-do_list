<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link rel="stylesheet" href="quizapp_css.css">
</head>
<body>

<canvas id="fireworks"></canvas>

<div class="quiz-container">
  <h3 id="progress"></h3>
  <h2 id="question"></h2>
  
  <ul id="options"></ul>

  <button id="next-btn">Next</button>

  <p id="quote" class="quote"></p>

  <div id="review-section" class="hidden">
    <h3>Review</h3>
    <ul id="answer-review"></ul>
    <button id="next-quiz-btn">Next Quiz</button>
  </div>

  <p id="score"></p>
</div>

<script src="quizapp_js.js"></script>
</body>
</html>
